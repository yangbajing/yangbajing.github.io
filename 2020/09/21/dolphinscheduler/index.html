      <div class="article-entry" itemprop="articleBody">
        <h2 id="系统配置"><a href="#系统配置" class="headerlink" title="系统配置"></a>系统配置</h2><p>操作系统环境</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br></pre></td><td class="code"><pre><span class="line">systemctl stop firewalld</span><br><span class="line">systemctl disable firewalld</span><br><span class="line"></span><br><span class="line"># Install softwares</span><br><span class="line">yum -y install epel-release</span><br><span class="line">yum -y install java-11-openjdk-devel tree htop vim sshpass wget curl</span><br><span class="line"></span><br><span class="line"># Add user</span><br><span class="line">useradd dolphinscheduler</span><br><span class="line">echo dolphinscheduler | passwd --stdin dolphinscheduler</span><br><span class="line">echo &apos;dolphinscheduler  ALL=(ALL)  NOPASSWD: NOPASSWD: ALL&apos; &gt;&gt; /etc/sudoers</span><br><span class="line">sed -i &apos;s/Defaults    requirett/#Defaults    requirett/g&apos; /etc/sudoers</span><br><span class="line"></span><br><span class="line"># Create directory</span><br><span class="line">mkdir /opt/dolphinscheduler</span><br><span class="line">chown -R dolphinscheduler:dolphinscheduler /opt/dolphinscheduler</span><br></pre></td></tr></table></figure>
<h2 id="免密登录"><a href="#免密登录" class="headerlink" title="免密登录"></a>免密登录</h2><p><strong><code>su dolphinscheduler</code></strong></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">ssh-keygen -t rsa -P &apos;&apos; -f ~/.ssh/id_rsa</span><br><span class="line">cat ~/.ssh/id_rsa.pub &gt;&gt; ~/.ssh/authorized_keys</span><br><span class="line">chmod 600 ~/.ssh/authorized_keys</span><br><span class="line"></span><br><span class="line">for ip in ds2 ds3;     #请将此处ds2 ds3替换为自己要部署的机器的hostname</span><br><span class="line">do</span><br><span class="line">    ssh-copy-id  $ip   #该操作执行过程中需要手动输入dolphinscheduler用户的密码</span><br><span class="line">done</span><br></pre></td></tr></table></figure>
<h2 id="安装-PostgreSQL"><a href="#安装-PostgreSQL" class="headerlink" title="安装 PostgreSQL"></a>安装 PostgreSQL</h2><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">sudo yum -y install https://yum.postgresql.org/12/redhat/rhel-7-x86_64/pgdg-redhat-repo-latest.noarch.rpm</span><br><span class="line">sudo yum -y install postgresql12 postgresql12-server</span><br><span class="line">sudo /usr/pgsql-12/bin/postgresql-12-setup initdb</span><br><span class="line">sudo systemctl enable postgresql-12</span><br><span class="line">sudo systemctl start postgresql-12</span><br></pre></td></tr></table></figure>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">sudo -u postgres psql -c &quot;create user dolphinscheduler nosuperuser replication encrypted password &apos;dolphinscheduler&apos;;&quot;</span><br><span class="line">sudo -u postgres psql -c &quot;create database dolphinscheduler owner=dolphinscheduler;&quot;</span><br></pre></td></tr></table></figure>
